<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ennovyx">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ennovyx University</title>
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Theme variables ─────────────────────────────────────── */
:root {
  --bg: #0a0a0f;
  --bg2: #13131a;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --text: #e5e7eb;
  --text2: #9ca3af;
  --text3: #6b7280;
  --nav-bg: rgba(10,10,15,0.92);
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
  --card-hover: rgba(255,255,255,0.07);
  --card-hover-border: rgba(99,102,241,0.4);
  --modal-bg: #13131a;
  --modal-border: rgba(255,255,255,0.1);
  --hero-title: #fff;
  --badge-bg: rgba(99,102,241,0.12);
  --badge-border: rgba(99,102,241,0.25);
  --empty-icon-bg: rgba(99,102,241,0.12);
  --playlist-bg: rgba(255,255,255,0.03);
  --playlist-active: rgba(99,102,241,0.15);
  --playlist-border: rgba(255,255,255,0.06);
}
body.light {
  --bg: #f2f2f7;
  --bg2: #fff;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.14);
  --text: #111827;
  --text2: #6b7280;
  --text3: #9ca3af;
  --nav-bg: rgba(255,255,255,0.96);
  --card-bg: #ffffff;
  --card-border: rgba(0,0,0,0.07);
  --card-hover: #f8f8ff;
  --card-hover-border: rgba(99,102,241,0.4);
  --modal-bg: #ffffff;
  --modal-border: rgba(0,0,0,0.1);
  --hero-title: #111827;
  --badge-bg: rgba(99,102,241,0.08);
  --badge-border: rgba(99,102,241,0.2);
  --empty-icon-bg: rgba(99,102,241,0.08);
  --playlist-bg: rgba(0,0,0,0.02);
  --playlist-active: rgba(99,102,241,0.08);
  --playlist-border: rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; transition:background 0.2s,color 0.2s;
}
/* ── Nav ────────────────────────────────────────────────── */
.eu-nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 48px;
  background:var(--nav-bg); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
  transition:background 0.2s;
  box-shadow:0 1px 12px rgba(0,0,0,0.08);
}
body.light .eu-nav {
  box-shadow:0 1px 16px rgba(0,0,0,0.06);
}
.eu-nav-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
.eu-nav-logo { 
  height:50px; width:auto; display:block; object-fit:contain;
  background:none !important; border-radius:0 !important;
  }
.eu-nav-right { display:flex; align-items:center; gap:10px; }
.eu-nav-link {
  font-size:13px; color:var(--text2); text-decoration:none;
  padding:6px 14px; border-radius:8px; transition:all 0.15s;
}
.eu-nav-link:hover { background:var(--border); color:var(--text); }
.eu-theme-btn {
  width:34px; height:34px; border-radius:9px;
  background:var(--card-bg); border:1px solid var(--border);
  color:var(--text2); cursor:pointer; display:flex;
  align-items:center; justify-content:center; font-size:16px;
  transition:all 0.15s;
}
.eu-theme-btn:hover { background:var(--border); color:var(--text); }
.eu-nav-user { font-size:13px; color:var(--text2); }
.eu-sign-btn {
  font-size:13px; font-weight:600; color:#fff;
  background:linear-gradient(135deg,#6366f1,#7c3aed);
  border:none; border-radius:9px; padding:7px 18px;
  cursor:pointer; text-decoration:none; transition:all 0.15s;
}
.eu-sign-btn:hover { opacity:0.9; }

/* ── Hero ───────────────────────────────────────────────── */
.eu-hero {
  text-align:center; padding:72px 24px 56px;
  position:relative; overflow:hidden;
  background:transparent;
}
body.light .eu-hero {
  background:linear-gradient(180deg, rgba(238,238,255,0.8) 0%, transparent 100%);
}
.eu-hero::before {
  content:''; position:absolute; top:0; left:0; right:0; height:320px;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(180,60,20,0.4) 0%, transparent 52%),
    radial-gradient(ellipse at 80% 0%, rgba(29,78,216,0.35) 0%, transparent 52%),
    radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.3) 0%, transparent 62%);
  mask-image:linear-gradient(to bottom,black 0%,transparent 100%);
  -webkit-mask-image:linear-gradient(to bottom,black 0%,transparent 100%);
  pointer-events:none; opacity:1; transition:opacity 0.2s;
}
body.light .eu-hero::before { opacity:0.3; }
.eu-hero-badge {
  display:inline-flex; align-items:center; gap:7px;
  font-size:12px; font-weight:600; letter-spacing:0.5px;
  color:#818cf8; background:var(--badge-bg); border:1px solid var(--badge-border);
  padding:5px 14px; border-radius:20px; margin-bottom:24px; position:relative;
}
.eu-hero-title {
  font-size:52px; font-weight:800; letter-spacing:-2px;
  color:var(--hero-title); margin-bottom:16px; line-height:1.1; position:relative;
}
.eu-hero-title span {
  background:linear-gradient(135deg,#818cf8,#a5b4fc);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
body.light .eu-hero-title span {
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.eu-hero-sub {
  font-size:16px; color:var(--text2); max-width:480px;
  margin:0 auto 32px; line-height:1.7; position:relative;
}
.eu-hero-actions { display:flex; gap:12px; justify-content:center; position:relative; }
.eu-btn-primary {
  padding:12px 28px; border-radius:12px; font-size:14px; font-weight:600;
  cursor:pointer; text-decoration:none; transition:all 0.18s; border:none;
  background:linear-gradient(135deg,#6366f1,#7c3aed); color:#fff;
  box-shadow:0 4px 20px rgba(99,102,241,0.35);
}
.eu-btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 28px rgba(99,102,241,0.45); }
.eu-btn-secondary {
  padding:12px 28px; border-radius:12px; font-size:14px; font-weight:600;
  cursor:pointer; text-decoration:none; transition:all 0.18s;
  background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(8px);
}
.eu-btn-secondary:hover { background:rgba(255,255,255,0.2); }
body.light .eu-btn-secondary {
  background:rgba(0,0,0,0.06); color:#111827; border:1px solid rgba(0,0,0,0.12);
  backdrop-filter:none;
}
body.light .eu-btn-secondary:hover { background:rgba(0,0,0,0.1); }

/* ── Main ───────────────────────────────────────────────── */
.eu-main { max-width:1100px; margin:0 auto; padding:0 24px 80px; }
.eu-section-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:24px; }

/* Login prompt */
.eu-login-prompt {
  text-align:center; padding:36px 24px; margin-bottom:32px;
  background:var(--badge-bg); border:1px solid var(--badge-border);
  border-radius:16px;
}
.eu-login-prompt h3 { font-size:17px; font-weight:700; color:var(--text); margin-bottom:8px; }
.eu-login-prompt p { color:var(--text2); font-size:14px; margin-bottom:16px; }

/* Course grid */
.eu-courses-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px;
}

/* Empty state */
.eu-empty {
  grid-column:1/-1; text-align:center; padding:80px 24px;
}
.eu-empty-icon {
  width:88px; height:88px; border-radius:28px;
  background:var(--empty-icon-bg); border:1px solid var(--badge-border);
  display:flex; align-items:center; justify-content:center;
  font-size:40px; color:#6366f1; margin:0 auto 24px;
}
.eu-empty-logo-img {
  height: 56px; width: auto; margin: 0 auto 28px;
  display: block; object-fit: contain;
}
body.light .eu-empty-logo-img { 
  content: url('/university/eu-logo-light.png'); 
}
.eu-empty h2 { font-size:26px; font-weight:700; color:var(--text); margin-bottom:12px; }
.eu-empty p { color:var(--text2); font-size:15px; line-height:1.7; max-width:340px; margin:0 auto 24px; }
.eu-coming-badge {
  display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600;
  padding:7px 18px; border-radius:20px;
  background:var(--badge-bg); border:1px solid var(--badge-border); color:#6366f1;
}

/* Course card */
.eu-course-card {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:18px; overflow:hidden; cursor:pointer;
  transition:all 0.18s; text-decoration:none; display:block;
}
.eu-course-card:hover {
  border-color:var(--card-hover-border); transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(0,0,0,0.2); background:var(--card-hover);
}
.eu-card-thumb { width:100%; height:180px; object-fit:cover; display:block; }
.eu-card-placeholder {
  width:100%; height:180px;
  background:linear-gradient(135deg,#6366f1,#7c3aed);
  display:flex; align-items:center; justify-content:center;
  font-size:56px; color:rgba(255,255,255,0.35);
}
.eu-card-body { padding:18px; }
.eu-card-cat {
  font-size:10px; font-weight:700; letter-spacing:0.8px;
  text-transform:uppercase; color:#818cf8; margin-bottom:8px;
}
.eu-card-title { font-size:16px; font-weight:600; color:var(--text); margin-bottom:8px; line-height:1.4; }
.eu-card-desc {
  font-size:13px; color:var(--text2); line-height:1.6;
  display:-webkit-box; -webkit-line-clamp:2;
  -webkit-box-orient:vertical; overflow:hidden; margin-bottom:14px;
}
.eu-card-footer { display:flex; align-items:center; justify-content:space-between; }
.eu-card-type {
  font-size:11px; color:#818cf8;
  background:rgba(99,102,241,0.1); padding:3px 9px; border-radius:6px;
  display:flex; align-items:center; gap:4px;
}
.eu-card-views { font-size:11px; color:var(--text3); display:flex; align-items:center; gap:4px; }

/* Spinner */
.eu-spinner-wrap { display:flex; justify-content:center; padding:80px; }
.eu-spinner {
  width:32px; height:32px; border-radius:50%;
  border:3px solid var(--border); border-top-color:#6366f1;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Modal ──────────────────────────────────────────────── */
.eu-modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px); z-index:1000;
  display:none; align-items:center; justify-content:center; padding:20px;
}
.eu-modal-overlay.open { display:flex; }
.eu-modal {
  background:var(--modal-bg); border:1px solid var(--modal-border);
  border-radius:20px; width:100%; max-width:780px;
  max-height:90vh; overflow:hidden; display:flex; flex-direction:column;
  box-shadow:0 24px 64px rgba(0,0,0,0.4);
}
body.light .eu-modal {
  box-shadow:0 24px 64px rgba(0,0,0,0.15);
}

/* Modal header */
.eu-modal-head {
  padding:20px 24px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
  flex-shrink:0;
}
.eu-modal-cat { font-size:11px; color:#818cf8; font-weight:600; letter-spacing:0.5px; margin-bottom:4px; }
.eu-modal-title { font-size:19px; font-weight:700; color:var(--text); }
.eu-modal-close {
  background:var(--border); border:none; color:var(--text2);
  width:32px; height:32px; border-radius:8px; cursor:pointer;
  font-size:16px; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.15s;
}
.eu-modal-close:hover { background:var(--border-strong); color:var(--text); }

/* Modal body - split when series */
.eu-modal-body {
  display:flex; flex:1; overflow:hidden; min-height:0;
}

/* Video player area */
.eu-modal-player { flex:1; overflow-y:auto; padding:20px 24px; }

/* Playlist sidebar */
.eu-playlist {
  width:240px; flex-shrink:0; border-left:1px solid var(--border);
  overflow-y:auto; background:var(--playlist-bg);
}
.eu-playlist-header {
  padding:14px 16px 10px; font-size:11px; font-weight:700;
  letter-spacing:0.6px; color:var(--text3); text-transform:uppercase;
  border-bottom:1px solid var(--playlist-border);
}
.eu-playlist-item {
  display:flex; align-items:center; gap:10px;
  padding:12px 14px; cursor:pointer; transition:all 0.14s;
  border-bottom:1px solid var(--playlist-border);
}
.eu-playlist-item:hover { background:var(--border); }
.eu-playlist-item.active { background:var(--playlist-active); }
.eu-playlist-num {
  width:24px; height:24px; border-radius:6px; flex-shrink:0;
  background:var(--border); display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:var(--text2);
}
.eu-playlist-item.active .eu-playlist-num {
  background:linear-gradient(135deg,#6366f1,#7c3aed); color:#fff;
}
.eu-playlist-name { font-size:12.5px; color:var(--text); line-height:1.4; }
.eu-playlist-item.active .eu-playlist-name { color:#818cf8; font-weight:600; }

/* Video embed/player */
.eu-video-embed {
  width:100%; aspect-ratio:16/9; border-radius:12px; overflow:hidden;
  background:#000; margin-bottom:16px;
}
.eu-video-embed iframe, .eu-video-embed video {
  width:100%; height:100%; border:none; border-radius:12px;
}
.eu-modal-desc { font-size:14px; color:var(--text2); line-height:1.7; margin-bottom:20px; }
.eu-pdf-btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 20px; border-radius:10px;
  background:var(--badge-bg); border:1px solid var(--badge-border);
  color:#818cf8; font-size:13px; font-weight:600;
  text-decoration:none; transition:all 0.15s;
}
.eu-pdf-btn:hover { background:rgba(99,102,241,0.2); }

@media (max-width:640px) {
  .eu-hero-title { font-size:34px; }
  .eu-nav { padding:14px 20px; }
  .eu-main { padding:0 16px 60px; }
  .eu-modal { max-height:95vh; }
  .eu-playlist { width:200px; }
}
</style>
</head>
<body>

<nav class="eu-nav">
  <a class="eu-nav-brand" href="/university">
    <img id="euLogo" class="eu-nav-logo" src="/university/eu-logo-dark.png" alt="Ennovyx University">
  </a>
  <div class="eu-nav-right">
    <a class="eu-nav-link" href="/dashboard">Dashboard</a>
    <button class="eu-theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
      <i class="bx bx-sun" id="themeIcon"></i>
    </button>
    <div id="euAuthStatus"></div>
  </div>
</nav>

<div class="eu-hero">
  <div class="eu-hero-badge"><i class='bx bx-graduation'></i> Ennovyx University</div>
  <h1 class="eu-hero-title">Learn without <span>limits</span></h1>
  <p class="eu-hero-sub">Expert-crafted courses for students who want to go beyond the classroom.</p>
  <div class="eu-hero-actions">
    <a class="eu-btn-primary" href="#courses">Browse Courses</a>
    <a class="eu-btn-secondary" href="/dashboard">Go to Dashboard</a>
  </div>
</div>

<div class="eu-main">
  <div id="euAuthPrompt"></div>
  <div id="courses">
    <div class="eu-section-title">All Courses</div>
    <div class="eu-courses-grid" id="euGrid">
      <div class="eu-spinner-wrap"><div class="eu-spinner"></div></div>
    </div>
  </div>
</div>

<div class="eu-modal-overlay" id="euModal">
  <div class="eu-modal" id="euModalInner">
    <div class="eu-modal-head" id="euModalHead"></div>
    <div class="eu-modal-body" id="euModalBody"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBUSsUx_gStTgVG97PvEBCY-KVbhpYFd-Y",
  authDomain: "ennovyxapp.firebaseapp.com",
  projectId: "ennovyxapp",
  storageBucket: "ennovyxapp.firebasestorage.app",
  messagingSenderId: "315135040726",
  appId: "1:315135040726:web:60bbd2e689c4b6cdaefd77"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
let allCourses = [];

// ── Theme ────────────────────────────────────────────────
function applyTheme(theme) {
  const isLight = theme === 'light';
  document.body.classList.toggle('light', isLight);
  const icon = document.getElementById('themeIcon');
  if (icon) {
    icon.className = isLight ? 'bx bx-moon' : 'bx bx-sun';
  }
  // Swap logo
  const logo = document.getElementById('euLogo');
  if (logo) {
    logo.src = isLight
      ? '/university/eu-logo-light.png'
      : '/university/eu-logo-dark.png';
  }
}
function toggleTheme() {
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem('eu-theme', next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('eu-theme') || 'dark');

// ── Auth ─────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  const authDiv = document.getElementById('euAuthStatus');
  const promptDiv = document.getElementById('euAuthPrompt');
  if (user) {
    authDiv.innerHTML = `<span class="eu-nav-user">Hi, ${user.email.split('@')[0]}</span>`;
    promptDiv.innerHTML = '';
  } else {
    authDiv.innerHTML = `<a class="eu-sign-btn" href="/dashboard">Sign In</a>`;
    promptDiv.innerHTML = `
      <div class="eu-login-prompt">
        <h3>Sign in to access courses</h3>
        <p>Use your Ennovyx account to track progress and access all content.</p>
        <a class="eu-sign-btn" href="/dashboard"><i class='bx bx-log-in'></i> Sign in</a>
      </div>`;
  }
});

// ── Courses ──────────────────────────────────────────────
async function loadCourses() {
  const grid = document.getElementById('euGrid');
  try {
    const res = await fetch('/api/university/courses');
    allCourses = await res.json();
  } catch(e) {
    grid.innerHTML = `<div class="eu-empty"><p style="color:var(--text2)">Could not load courses.</p></div>`;
    return;
  }

  if (!allCourses.length) {
    grid.innerHTML = `
      <div class="eu-empty">
        <img class="eu-empty-logo-img" src="/university/eu-logo-dark.png" alt="Ennovyx University"
             onerror="this.style.display='none'">
        <h2>Courses Coming Soon</h2>
        <p>We are crafting expert content just for you. Check back soon!</p>
        <span class="eu-coming-badge"><i class='bx bx-rocket'></i> Launching Soon</span>
      </div>`;
    return;
  }

  grid.innerHTML = allCourses.map(c => {
    const videos = c.videoUrls?.length ? c.videoUrls : (c.videoUrl ? [c.videoUrl] : []);
    const hasPdf = !!c.pdfUrl;
    const typeParts = [];
    if (videos.length === 1) typeParts.push('<i class=\'bx bx-video\'></i> Video');
    if (videos.length > 1) typeParts.push(`<i class='bx bx-list-ul'></i> ${videos.length} Videos`);
    if (hasPdf) typeParts.push('<i class=\'bx bx-file-pdf\'></i> PDF');
    const typeLabel = typeParts.join(' · ');
    const thumb = c.thumbnail
      ? `<img class="eu-card-thumb" src="${c.thumbnail}" alt="${c.title}">`
      : `<div class="eu-card-placeholder"><i class='bx bx-play-circle'></i></div>`;
    return `
      <a class="eu-course-card" onclick="openCourse('${c.id}');return false;" href="#">
        ${thumb}
        <div class="eu-card-body">
          <div class="eu-card-cat">${c.category}</div>
          <div class="eu-card-title">${c.title}</div>
          <div class="eu-card-desc">${c.description}</div>
          <div class="eu-card-footer">
            <span class="eu-card-type">${typeLabel}</span>
            <span class="eu-card-views"><i class='bx bx-show'></i> ${c.views || 0}</span>
          </div>
        </div>
      </a>`;
  }).join('');

  const urlCourse = new URLSearchParams(window.location.search).get('course');
  if (urlCourse) openCourse(urlCourse);
}

// ── Open course modal ─────────────────────────────────────
let currentVideoIdx = 0;

function youtubeEmbed(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([a-zA-Z0-9_-]{11})/);
  return m ? `https://www.youtube.com/embed/${m[1]}?autoplay=0` : url;
}

function isLocal(url) { return url && url.startsWith('/university/uploads/'); }

function renderVideo(url, title) {
  if (isLocal(url)) {
    return `<div class="eu-video-embed">
      <video controls>
        <source src="${url}">Your browser does not support video.
      </video>
    </div>`;
  }
  return `<div class="eu-video-embed">
    <iframe src="${youtubeEmbed(url)}" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>
  </div>`;
}

function openCourse(id) {
  fetch(`/api/university/courses/${id}/view`, { method:'POST' }).catch(()=>{});
  const c = allCourses.find(x => x.id === id);
  if (!c) return;

  currentVideoIdx = 0;
  const videos = c.videoUrls?.length ? c.videoUrls : (c.videoUrl ? [c.videoUrl] : []);
  const hasPdf = !!c.pdfUrl;

  // Header
  document.getElementById('euModalHead').innerHTML = `
    <div>
      <div class="eu-modal-cat">${c.category}</div>
      <div class="eu-modal-title">${c.title}</div>
    </div>
    <button class="eu-modal-close" onclick="closeModal()"><i class='bx bx-x'></i></button>`;

  // Body: player + optional playlist sidebar
  const body = document.getElementById('euModalBody');

  const pdfHtml = hasPdf ? `<a class="eu-pdf-btn" href="${c.pdfUrl}" target="_blank" download><i class='bx bx-file-pdf'></i> Download PDF</a>` : '';

  if (videos.length <= 1) {
    // Single video or no video — full width
    const videoHtml = videos.length ? renderVideo(videos[0], c.title) : '';
    body.innerHTML = `
      <div class="eu-modal-player">
        ${videoHtml}
        <p class="eu-modal-desc">${c.description}</p>
        ${pdfHtml}
      </div>`;
  } else {
    // Series — player + playlist sidebar
    body.innerHTML = `
      <div class="eu-modal-player" id="euPlayer">
        ${renderVideo(videos[0], c.title)}
        <p class="eu-modal-desc">${c.description}</p>
        ${pdfHtml}
      </div>
      <div class="eu-playlist">
        <div class="eu-playlist-header"><i class='bx bx-list-ul'></i> Series · ${videos.length} Videos</div>
        ${videos.map((url, i) => {
          const name = isLocal(url) ? `Video ${i+1}` : `Lesson ${i+1}`;
          return `<div class="eu-playlist-item${i===0?' active':''}" onclick="playVideo(${i},'${id}')" id="pli_${i}">
            <div class="eu-playlist-num">${i+1}</div>
            <div class="eu-playlist-name">${name}</div>
          </div>`;
        }).join('')}
      </div>`;
  }

  document.getElementById('euModal').classList.add('open');
}

function playVideo(idx, courseId) {
  const c = allCourses.find(x => x.id === courseId);
  if (!c) return;
  const videos = c.videoUrls?.length ? c.videoUrls : (c.videoUrl ? [c.videoUrl] : []);
  
  // Update player
  const player = document.getElementById('euPlayer');
  if (player) {
    const hasPdf = !!c.pdfUrl;
    const pdfHtml = hasPdf ? `<a class="eu-pdf-btn" href="${c.pdfUrl}" target="_blank" download><i class='bx bx-file-pdf'></i> Download PDF</a>` : '';
    player.innerHTML = `
      ${renderVideo(videos[idx], c.title)}
      <p class="eu-modal-desc">${c.description}</p>
      ${pdfHtml}`;
  }

  // Update active playlist item
  document.querySelectorAll('.eu-playlist-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  currentVideoIdx = idx;
}

function closeModal() {
  document.getElementById('euModal').classList.remove('open');
  // Pause any playing video by clearing player
  document.getElementById('euModalBody').innerHTML = '';
}
document.getElementById('euModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

loadCourses();
</script>
</body>
</html>
