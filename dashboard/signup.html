<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ennovyx">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - ENNOVYX</title>
  <link rel="icon" type="image/png" sizes="32x32" href="images/icon-final.png">
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: #f6f5f2;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo-div {
  margin: 32px 0 16px;
  text-align: center;
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
  font-weight: 600;
}

.signup-container {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 120px;
  max-width: 1100px;
  width: 100%;
  padding: 40px;
}

.signup-form {
  background: #ffffff;
  padding: 40px;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  width: 100%;
  position: relative;
}

.signup-form h2 {
  margin: 0 0 24px;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.4px;
}

.signup-form input[type="email"],
.signup-form input[type="password"],
.signup-form input[type="text"] {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 16px;
  border-radius: 8px;
  border: none;
  background: #f2f2f2;
  font-size: 15px;
  outline: none;
  transition: all 0.2s;
}

.signup-form input:focus {
  background: #e8e8e8;
}

.signup-form input::placeholder {
  color: #6b6b6b;
}

.message-box {
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 14px;
  display: none;
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.message-box.error {
  background: #fee;
  color: #c33;
  border-left: 3px solid #c33;
}

.message-box.success {
  background: #efe;
  color: #3a3;
  border-left: 3px solid #3a3;
}

.message-box.info {
  background: #eef;
  color: #33a;
  border-left: 3px solid #33a;
}

#signupBtn,
#loginSubmitBtn,
#resetPasswordBtn {
  margin-top: 8px;
  padding: 14px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: #111111;
  color: #ffffff;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

#signupBtn:hover,
#loginSubmitBtn:hover,
#resetPasswordBtn:hover {
  background: #2a2a2a;
}

#signupBtn:disabled,
#loginSubmitBtn:disabled,
#resetPasswordBtn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

#loginBtn,
#signupLinkBtn,
#backToLoginBtn {
  background: none;
  border: 1px solid #dddddd;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}

#loginBtn:hover,
#signupLinkBtn:hover,
#backToLoginBtn:hover {
  background: #f5f5f5;
}

.signup-form p {
  margin-top: 24px;
  font-size: 14px;
  color: #555;
  text-align: center;
}

.forgot-password-link {
  margin-top: 12px;
  font-size: 13px;
  color: #666;
  text-align: right;
  cursor: pointer;
  text-decoration: none;
  display: block;
}

.forgot-password-link:hover {
  color: #111;
  text-decoration: underline;
}

.testimonial {
  display: flex;
  flex-direction: column;
  justify-content: center;
  max-width: 420px;
}

.testimonial img {
  width: 46px;
  border-radius: 50%;
  margin-bottom: 12px;
}

.testimonial p {
  font-size: 15px;
  line-height: 1.5;
  color: #444;
  text-align: center;
}

@media (max-width: 900px) {
  body {
    justify-content: flex-start;
  }

  .signup-container {
    grid-template-columns: 1fr;
    gap: 32px;
    padding: 20px;
  }

  .signup-form {
    padding: 28px 24px;
    border-radius: 14px;
  }

  .signup-form h2 {
    font-size: 24px;
    text-align: center;
  }

  .testimonial {
    max-width: 100%;
    align-items: center;
    padding-bottom: 40px;
  }

  .testimonial p {
    font-size: 14px;
  }
}

@media (max-width: 420px) {
  .signup-form {
    padding: 24px 20px;
  }

  .signup-form input {
    font-size: 14px;
  }

  #signupBtn,
  #loginSubmitBtn,
  #resetPasswordBtn {
    font-size: 14px;
  }
}

.login-mode .testimonial {
  display: none;
}

.login-mode .signup-container {
  grid-template-columns: 1fr;
  justify-items: center;
}

.login-mode .signup-form {
  max-width: 420px;
}
</style>
</head>
<body>
  <div class="logo-div"><img src="images/logo-full (2).png" alt="" width="160px" height="80px"></div>
  
  <div class="signup-container">
    <!-- SIGNUP SECTION -->
    <div class="signup-form" id="signupSection">
      <h2>Create Account</h2>
      <div class="message-box" id="signupMessage"></div>
      
      <input type="text" id="signupName" placeholder="Your full name" required autocomplete="name">
      <input type="email" id="signupEmail" placeholder="Email address" required autocomplete="email">
      <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" required autocomplete="new-password">
      
      <button id="signupBtn" onclick="handleSignup()">Sign Up</button>
      
      <p style="margin-top: 20px; font-size: 14px;">
        Already have an account? 
        <button id="loginBtn" onclick="showLoginForm()">Log In</button>
      </p>
    </div>

    <!-- LOGIN SECTION -->
    <div class="signup-form" id="loginSection" style="display: none;">
      <h2>Welcome Back</h2>
      <div class="message-box" id="loginMessage"></div>
      
      <input type="email" id="loginEmail" placeholder="Email address" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      
      <a class="forgot-password-link" onclick="showForgotPassword()">Forgot password?</a>
      
      <button id="loginSubmitBtn" onclick="handleLogin()">Log In</button>
      
      <p style="margin-top: 20px; font-size: 14px;">
        Don't have an account? 
        <button id="signupLinkBtn" onclick="showSignupForm()">Sign Up</button>
      </p>
    </div>

    <!-- FORGOT PASSWORD SECTION -->
    <div class="signup-form" id="forgotPasswordSection" style="display: none;">
      <h2>Reset Password</h2>
      <div class="message-box" id="forgotMessage"></div>
      
      <p style="margin-top: 0; margin-bottom: 24px; text-align: left; color: #666; font-size: 14px;">
        Enter your email address and we'll send you a link to reset your password.
      </p>
      
      <input type="email" id="forgotEmail" placeholder="Email address" required>
      
      <button id="resetPasswordBtn" onclick="handleForgotPassword()">Send Reset Link</button>
      
      <p style="margin-top: 20px; font-size: 14px;">
        Remember your password? 
        <button id="backToLoginBtn" onclick="showLoginForm()">Back to Login</button>
      </p>
    </div>

    <!-- TESTIMONIAL -->
    <div class="testimonial">
      <center><img src="images/download.png" class="profile-img" alt="Logo"></center>
      <p>"Making students life much easier than it already was"</p>
      <p>Founder, ENNOVYX</p>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  
  <!-- Your Scripts -->
  <script src="/dashboard/script/firebase.js"></script>
  <script src="/dashboard/script/auth.js"></script>

  <script>
    // ========================================
    // MESSAGE HANDLING
    // ========================================
    function showMessage(elementId, message, type) {
      const messageBox = document.getElementById(elementId);
      messageBox.textContent = message;
      messageBox.className = `message-box ${type}`;
      messageBox.style.display = 'block';
      
      setTimeout(() => {
        messageBox.style.display = 'none';
      }, 5000);
    }

    function clearMessages() {
      document.querySelectorAll('.message-box').forEach(box => {
        box.style.display = 'none';
      });
    }

    // ========================================
    // NAVIGATION
    // ========================================
    function showLoginForm() {
      clearMessages();
      document.getElementById('signupSection').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('forgotPasswordSection').style.display = 'none';
      document.body.classList.add('login-mode');
    }

    function showSignupForm() {
      clearMessages();
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('signupSection').style.display = 'block';
      document.getElementById('forgotPasswordSection').style.display = 'none';
      document.body.classList.remove('login-mode');
    }

    function showForgotPassword() {
      clearMessages();
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('signupSection').style.display = 'none';
      document.getElementById('forgotPasswordSection').style.display = 'block';
      document.body.classList.add('login-mode');
    }

    // ========================================
    // AUTHENTICATION HANDLERS
    // ========================================
    function handleSignup() {
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      
      if (!name || !email || !password) {
        showMessage('signupMessage', 'Please fill in all fields', 'error');
        return;
      }
      
      if (password.length < 6) {
        showMessage('signupMessage', 'Password must be at least 6 characters', 'error');
        return;
      }
      
      document.getElementById('signupBtn').disabled = true;
      document.getElementById('signupBtn').textContent = 'Creating account...';
      
      signUp(email, password, name);
    }

    function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      if (!email || !password) {
        showMessage('loginMessage', 'Please fill in all fields', 'error');
        return;
      }
      
      document.getElementById('loginSubmitBtn').disabled = true;
      document.getElementById('loginSubmitBtn').textContent = 'Logging in...';
      
      login(email, password);
    }

    // ========================================
    // PASSWORD RESET (Firebase Only)
    // ========================================
    async function handleForgotPassword() {
      const email = document.getElementById('forgotEmail').value.trim();
      
      if (!email) {
        showMessage('forgotMessage', 'Please enter your email address', 'error');
        return;
      }

      // Validate email format
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showMessage('forgotMessage', 'Please enter a valid email address', 'error');
        return;
      }
      
      const btn = document.getElementById('resetPasswordBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      
      try {
        // Use Firebase's built-in password reset
        // Simple call without continue URL to avoid auth/unauthorized-continue-uri error
        await firebase.auth().sendPasswordResetEmail(email);
        
        showMessage('forgotMessage', '✅ Password reset email sent! Check your inbox (and spam folder).', 'success');
        
        // Clear input
        document.getElementById('forgotEmail').value = '';
        
        // Redirect to login after 3 seconds
        setTimeout(() => {
          showLoginForm();
        }, 3000);
        
      } catch (error) {
        console.error('Password reset error:', error);
        console.log('Error code:', error.code);
        console.log('Error message:', error.message);
        
        if (error.code === 'auth/user-not-found') {
          // Don't reveal if user exists - security best practice
          showMessage('forgotMessage', '✅ If an account exists with this email, you will receive a reset link.', 'success');
        } else if (error.code === 'auth/invalid-email') {
          showMessage('forgotMessage', 'Please enter a valid email address', 'error');
        } else if (error.code === 'auth/too-many-requests') {
          showMessage('forgotMessage', 'Too many attempts. Please try again later.', 'error');
        } else if (error.code === 'auth/missing-continue-uri' || error.code === 'auth/invalid-continue-uri') {
          // Template not configured - show helpful message
          showMessage('forgotMessage', '⚠️ Email service not fully configured. Please contact support at support@ennovyx.com', 'error');
        } else {
          // For other errors, show what went wrong
          showMessage('forgotMessage', `Error: ${error.message || 'Failed to send reset email'}`, 'error');
        }
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    }

    // ========================================
    // KEYBOARD SUPPORT
    // ========================================
    document.addEventListener('DOMContentLoaded', () => {
      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            const section = input.closest('.signup-form');
            if (section.id === 'signupSection') {
              handleSignup();
            } else if (section.id === 'loginSection') {
              handleLogin();
            } else if (section.id === 'forgotPasswordSection') {
              handleForgotPassword();
            }
          }
        });
      });
    });

    // ========================================
    // OVERRIDE ALERT FOR CLEAN MESSAGES
    // ========================================
    window.alert = function(message) {
      if (document.getElementById('signupSection').style.display !== 'none') {
        const type = message.toLowerCase().includes('success') ? 'success' : 'error';
        showMessage('signupMessage', message, type);
        document.getElementById('signupBtn').disabled = false;
        document.getElementById('signupBtn').textContent = 'Sign Up';
      } else if (document.getElementById('loginSection').style.display !== 'none') {
        const type = message.toLowerCase().includes('success') ? 'success' : 'error';
        showMessage('loginMessage', message, type);
        document.getElementById('loginSubmitBtn').disabled = false;
        document.getElementById('loginSubmitBtn').textContent = 'Log In';
      }
    };
  </script>
</body>
</html>
